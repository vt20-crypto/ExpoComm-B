# --- ExpoComm-only baseline for MPE ---
# Exponential topology communication, NO bandwidth compression.
# Uses ExpoComm one-peer mode with QMIX mixer.

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000
evaluation_epsilon: 0.0
runner: "episode"

buffer_size: 5000
batch_size: 32

target_update_interval_or_tau: 200

# --- ExpoComm specific ---
mac: "ExpoComm_mac"
topk_neighbors: 3          # for N=3 agents: log2(3)+1 ≈ 3 (all neighbors + self)
one_peer: True
agent: "ExpoComm_one_peer"
obs_agent_id: True
obs_last_action: True
obs_individual_obs: False

# --- Training ---
agent_output_type: "q"
learner: "aux_q_learner"
aux_coef: 0.1
standardise_returns: False
standardise_rewards: True
double_q: True
mixer: "qmix"
use_rnn: True
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

gamma: 0.99
lr: 0.0005

pos_flag: False

name: "ExpoComm_mpe"
