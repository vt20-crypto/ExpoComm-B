# --- Full-comm QMIX baseline for MPE ---
# Standard QMIX with basic RNN agent.
# All-to-all implicit communication through shared training (CTDE).
# No explicit message passing, no bandwidth constraint.

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000
evaluation_epsilon: 0.0
runner: "episode"

buffer_size: 5000
batch_size: 32

target_update_interval_or_tau: 200

# --- Standard QMIX (no ExpoComm, no BVME) ---
mac: "basic_mac"
agent: "rnn"
obs_agent_id: True
obs_last_action: True
obs_individual_obs: False

# --- Training ---
agent_output_type: "q"
learner: "q_learner"
standardise_returns: False
standardise_rewards: True
double_q: True
mixer: "qmix"
use_rnn: True
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

gamma: 0.99
lr: 0.0005

name: "qmix_fullcomm_mpe"
