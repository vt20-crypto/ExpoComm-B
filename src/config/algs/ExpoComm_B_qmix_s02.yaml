# --- ExpoComm-B with QMIX (σ₀ = 0.02, MODERATE compression) ---
# Same as ExpoComm_B_qmix but with relaxed bandwidth constraint.
# Higher σ₀ → wider prior → less KL penalty → less compression.

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 5000
evaluation_epsilon: 0.0
runner: "episode"

batch_size: 64
buffer_size: 2000

target_update_interval_or_tau: 200

mac: "ExpoComm_bvme_mac"
topk_neighbors: 7
one_peer: True
agent: "ExpoComm_bvme"
obs_agent_id: True
obs_last_action: True
obs_individual_obs: False

# --- BVME hyperparameters (MODERATE compression) ---
bvme_sigma_0: 0.02
bvme_lambda_kl: 1.0
bvme_compressed_dim: null
bvme_log_var_min: -5.0
bvme_log_var_max: 3.0

agent_output_type: "q"
learner: "bvme_q_learner"
aux_coef: 0.1
standardise_returns: False
standardise_rewards: True
double_q: True
mixer: "qmix"
use_rnn: True
mixing_embed_dim: 64
hypernet_layers: 2
hypernet_embed: 64

gamma: 0.95
lr: 0.0001

pos_flag: False

name: "ExpoComm_B_qmix_s02"
