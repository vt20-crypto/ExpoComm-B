# --- ExpoComm + QMIX (Sparse Topology, No Compression) ---
# Original ExpoComm with exponential topology but NO BVME bottleneck.
# This isolates the effect of our BVME addition.

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 5000
evaluation_epsilon: 0.0
runner: "episode"

batch_size: 64
buffer_size: 2000

target_update_interval_or_tau: 200

# --- ExpoComm (original, no BVME) ---
mac: "ExpoComm_mac"
topk_neighbors: 7
one_peer: True
agent: "ExpoComm_one_peer"
obs_agent_id: True
obs_last_action: True
obs_individual_obs: False

# --- Training ---
agent_output_type: "q"
learner: "aux_q_learner"
aux_coef: 0.1
standardise_returns: False
standardise_rewards: True
double_q: True
mixer: "qmix"
use_rnn: True
mixing_embed_dim: 64
hypernet_layers: 2
hypernet_embed: 64

gamma: 0.95
lr: 0.0001

pos_flag: False

name: "ExpoComm_qmix"
