# --- QMIX Baseline (Full Communication, No Topology, No Compression) ---
# Each agent acts independently based on its own observation. No message passing.

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 5000
evaluation_epsilon: 0.0
runner: "episode"

batch_size: 64
buffer_size: 2000

target_update_interval_or_tau: 200

mac: "basic_mac"
agent: "rnn"
obs_agent_id: True
obs_last_action: True
obs_individual_obs: False

agent_output_type: "q"
learner: "q_learner"
standardise_returns: False
standardise_rewards: True
double_q: True
mixer: "qmix"
use_rnn: True
mixing_embed_dim: 64
hypernet_layers: 2
hypernet_embed: 64

gamma: 0.95
lr: 0.0001

name: "QMIX_baseline"
