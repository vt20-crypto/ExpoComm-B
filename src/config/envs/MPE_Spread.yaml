# --- MPE Simple Spread (Cooperative Navigation) ---
# N agents must cooperatively navigate to N landmarks.
# Standard cooperative MARL benchmark.

env: "MPE_Spread"

env_args:
  n_agents: 3           # 3 agents, 3 landmarks (standard setting)
  max_cycles: 25        # standard episode length for MPE
  continuous_actions: False  # discrete actions for Q-learning

test_greedy: True
test_nepisode: 32         # reduced from 100 (still statistically robust)
test_interval: 25000      # evaluate every 25k steps (was 10k)
log_interval: 25000
runner_log_interval: 10000
learner_log_interval: 10000
t_max: 500000             # 500k steps — converges well for 3-agent MPE
                          # (your run showed convergence by ~100k steps)

